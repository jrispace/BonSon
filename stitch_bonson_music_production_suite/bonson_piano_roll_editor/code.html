<div class="flex items-center gap-2">

<span class="material-symbols-outlined">edit</span>

<span class="material-symbols-outlined text-[18px]">grid_4x4</span>

</button>
<button class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-on-surface-variant hover:bg-white/5 transition-all">

<span class="material-symbols-outlined">analytics</span>
<span class="font-label-caps text-label-caps font-label-mono text-label-mono uppercase">Audio Editor</span>
</div>

<script>
        // Generate Piano Keys
        const pianoKeysContainer = document.getElementById('piano-keys');
        const notes = ['B', 'Bb', 'A', 'Ab', 'G', 'Gb', 'F', 'E', 'Eb', 'D', 'Db', 'C'];
        const octaves = [4, 3, 2];
        
        octaves.forEach(octave => {
            notes.forEach(note => {
                const key = document.createElement('div');
                const isBlack = note.includes('b');
                const isC = note === 'C';
                
                key.className = `flex-shrink-0 h-10 w-full border-b border-white/10 relative flex items-center justify-end pr-2 transition-all cursor-pointer hover:bg-white/5 active:bg-primary/20`;
                
                if (isBlack) {
                    key.classList.add('bg-black');
                } else if (isC) {
                    key.classList.add('c-highlight');
                } else {
                    key.classList.add('bg-surface-container-low');
                }

                key.innerHTML = `<span class="text-[9px] font-label-mono text-on-surface-variant ${isC ? 'text-primary font-bold' : 'opacity-40'}">${note}${octave}</span>`;
                pianoKeysContainer.appendChild(key);
            });
        });

        // AI Assistant Toast Interaction
        document.getElementById('ai-suggest').addEventListener('click', () => {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-24 right-8 bg-surface-container-high/90 border border-primary/20 backdrop-blur-2xl p-6 rounded-2xl shadow-2xl max-w-xs animate-bounce-short z-[100]';
            toast.innerHTML = `
                <div class="flex gap-4 items-start">
                    <span class="material-symbols-outlined text-primary">psychology</span>
                    <div>
                        <h4 class="font-headline-sm text-headline-sm text-primary text-[14px] mb-1">AI Suggestion</h4>
                        <p class="text-on-surface-variant text-[12px] leading-relaxed mb-4">I've generated a C Minor tension-builder based on your rhythm. Apply "Dark Cinematic" progression?</p>
                        <div class="flex gap-2">
                            <button class="px-3 py-1 bg-primary text-on-primary text-[11px] font-bold rounded-lg uppercase">Apply</button>
                            <button class="px-3 py-1 border border-white/10 text-[11px] font-bold rounded-lg uppercase" onclick="this.parentElement.parentElement.parentElement.parentElement.remove()">Dismiss</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.remove('animate-bounce-short'), 1000);
        });
    </script>
